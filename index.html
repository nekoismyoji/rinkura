<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リンクラアーカイブ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu-screen">
    <div style="height:50px;"></div>
    <a href="javascript:void(0)" class="menu-button btn-connect" onclick="showArchive()">
      <div style="font-size:12px;">VIDEO STREAMING</div>
      <div style="font-size:22px; font-weight:bold;">スクールアイドルコネクト</div>
    </a>
  </div>

  <div id="archive-screen">
    <div class="header">
      <span onclick="showMenu()" style="cursor:pointer;">←</span>
      <span>スクールアイドルコネクト</span>
      <span>🔍</span>
    </div>
    
    <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa;">
      <span style="font-size:14px; font-weight:bold;">🎵 Archive</span>
      <button class="btn-filter-open" onclick="openFilter()">フィルター</button>
    </div>

    <div class="archive-grid" id="video-grid"></div>
  </div>

  <div id="filter-modal">
    <div class="modal-content">
      <h3 style="margin-top:0; text-align:center; color:#8ba9eb;">フィルター</h3>
      
      <div class="filter-section">
        <strong>日付</strong><br>
        <input type="date" id="date-start"> 〜 <input type="date" id="date-end">
      </div>

      <div class="filter-section">
        <strong>メンバー</strong><br>
        <label><input type="checkbox" name="member" value="kaho">花帆</label>
        <label><input type="checkbox" name="member" value="sayaka">さやか</label>
        <label><input type="checkbox" name="member" value="kozue">梢</label><br>
        <label><input type="checkbox" name="member" value="tsuzuri">綴理</label>
        <label><input type="checkbox" name="member" value="rurino">瑠璃乃</label>
        <label><input type="checkbox" name="member" value="megumi">慈</label>
      </div>

      <div class="filter-section">
        <strong>メンバー検索条件</strong><br>
        <label><input type="radio" name="condition" value="or" checked>OR (誰か1人でも出演)</label><br>
        <label><input type="radio" name="condition" value="and">AND (選択した全員が出演)</label>
      </div>

      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeFilter()">キャンセル</button>
        <button class="btn-cancel" onclick="resetFilter()">リセット</button>
        <button class="btn-submit" onclick="applyFilter()">OK</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
　
  <div id="video-modal">
    <div class="video-wrapper">
      <div class="close-video" onclick="closeVideo()">× 閉じる</div>
      <iframe id="yt-player" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>
  </div>
