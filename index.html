<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リンクラアーカイブ</title>
<style>
  body { background-color: #eaddcf; font-family: sans-serif; margin: 0; }
  
  /* メニュー画面 */
  #menu-screen { display: flex; flex-direction: column; align-items: center; padding: 20px; }
  
  /* アーカイブ画面（最初は隠しておく） */
  #archive-screen { display: none; flex-direction: column; height: 100vh; background-color: #fff; }

  .header {
    background: linear-gradient(to right, #8ba9eb, #b89ced);
    color: white; padding: 10px; display: flex; align-items: center; justify-content: space-between;
  }

  .tab-bar { display: flex; justify-content: space-around; background: #f8f9fa; border-bottom: 1px solid #ddd; font-size: 10px; color: #888; }
  .tab { padding: 10px 0; text-align: center; flex: 1; }
  .tab.active { color: #8ba9eb; border-bottom: 2px solid #8ba9eb; }

  /* グリッドレイアウト */
  .archive-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; overflow-y: auto;
  }

  .archive-card { background: #eee; border-radius: 8px; overflow: hidden; position: relative; }
  .archive-card img { width: 100%; display: block; }
  .card-info { padding: 5px; font-size: 10px; font-weight: bold; }

  /* 共通ボタン（前回の流用） */
  .menu-button {
    width: 90%; max-width: 350px; height: 100px; border-radius: 12px; margin-bottom: 20px;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
    padding-right: 20px; color: white; text-decoration: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .btn-connect { background: linear-gradient(135deg, #9ae0aa, #6fc88b); }
  .btn-story { background: linear-gradient(135deg, #d8a273, #be7f4c); }
  .btn-card { background: linear-gradient(135deg, #8ba9eb, #6688d4); }
</style>
</head>
<body>

  <div id="menu-screen">
    <div style="height:100px;"></div>
    <a href="javascript:void(0)" class="menu-button btn-connect" onclick="showArchive()">
      <div style="font-size:12px;">VIDEO STREAMING</div>
      <div style="font-size:22px; font-weight:bold;">スクールアイドルコネクト</div>
    </a>
    <div class="menu-button btn-story">
      <div style="font-size:12px;">STORY</div>
      <div style="font-size:22px; font-weight:bold;">活動記録</div>
    </div>
    <div class="menu-button btn-card">
      <div style="font-size:12px;">COLLECTION</div>
      <div style="font-size:22px; font-weight:bold;">カード</div>
    </div>
  </div>

  <div id="archive-screen">
    <div class="header">
      <span onclick="showMenu()" style="cursor:pointer;">←</span>
      <span>スクールアイドルコネクト</span>
      <span>🔍</span>
    </div>
    <div class="tab-bar">
      <div class="tab">UPCOMING</div>
      <div class="tab active">ARCHIVES</div>
      <div class="tab">With×STATION</div>
      <div class="tab">MUSIC VIDEO</div>
    </div>
    
    <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size:14px; font-weight:bold;">🎵 Archive</span>
      <button style="border-radius: 20px; border: 1px solid #ccc; padding: 5px 15px;">フィルター</button>
    </div>

    <div class="archive-grid">
      <div class="archive-card">
        <div style="width:100%; aspect-ratio:16/9; background:#aaa;"></div>
        <div class="card-info">2026.03.30 <br> Fes×LIVE STAGE</div>
      </div>
      <div class="archive-card">
        <div style="width:100%; aspect-ratio:16/9; background:#aaa;"></div>
        <div class="card-info">2026.03.28 <br> With×MEETS</div>
      </div>
    </div>
  </div>

  <script>
    function showArchive() {
      document.getElementById('menu-screen').style.display = 'none';
      document.getElementById('archive-screen').style.display = 'flex';
    }
    function showMenu() {
      document.getElementById('menu-screen').style.display = 'flex';
      document.getElementById('archive-screen').style.display = 'none';
    }
  </script>
</body>
</html>
